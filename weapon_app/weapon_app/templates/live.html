<!DOCTYPE html>
<html>
<head>
    <title>Live Camera - Weapon & Suspect Detection</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
        }

        h2 {
            margin-bottom: 10px;
            color: #333;
        }
        
        .description {
            color: #666;
            margin-bottom: 20px;
        }

        .video-container {
            margin-top: 20px;
            display: inline-block;
            border-radius: 10px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.3);
            overflow: hidden;
            background-color: #000;
        }
        
        .video-container img {
            display: block;
            max-width: 100%;
            height: auto;
        }

        .controls {
            margin-top: 30px;
        }

        .btn-stop {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            background-color: #dc3545;
            color: white;
            border-radius: 5px;
            font-weight: bold;
        }

        .btn-stop:hover {
            background-color: #c82333;
        }
        
        .legend {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 14px;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .box-red {
            width: 15px;
            height: 15px;
            background-color: #dc3545;
            border: 1px solid #c82333;
        }
        
        .box-green {
            width: 15px;
            height: 15px;
            background-color: #28a745;
            border: 1px solid #218838;
        }
        
        .box-orange {
            width: 15px;
            height: 15px;
            background-color: #fd7e14;
            border: 1px solid #e26b0a;
        }
    </style>
</head>
<body>

    <h2>🔴 Live Camera Detection</h2>
    <div class="description">Real-time weapon detection and suspect identification.</div>

    <div class="legend">
        <div class="legend-item"><div class="box-red"></div> Known Suspect / Gun</div>
        <div class="legend-item"><div class="box-green"></div> Unknown Person</div>
        <div class="legend-item"><div class="box-orange"></div> Knife</div>
    </div>

    <div class="video-container">
        <!-- The image source points to the MJPEG streaming endpoint -->
        <img src="{{ url_for('video_feed') }}" width="800" alt="Live Camera Feed">
    </div>

    <div class="controls">
        <a href="{{ url_for('index') }}" class="btn-stop">⏹ Stop Camera & Return</a>
    </div>

</body>
</html>
